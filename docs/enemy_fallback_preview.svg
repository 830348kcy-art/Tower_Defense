<svg xmlns="http://www.w3.org/2000/svg" width="760" height="610" viewBox="0 0 760 610">
  <defs>
    <style>
      .page { fill: #0f172a; }
      .card { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; }
      .icon-bg { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 2; }
      .ink { stroke: #0f172a; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .title { font: 700 13px "Segoe UI", sans-serif; fill: #f8fafc; }
      .id { font: 500 11px "Consolas", monospace; fill: #94a3b8; }
      .shine { fill: rgba(255,255,255,.55); }
    </style>

    <g id="bg">
      <rect class="icon-bg" x="2" y="2" width="76" height="76" rx="10" />
    </g>

    <g id="normal">
      <use href="#bg" />
      <ellipse cx="40" cy="43" rx="21" ry="18" fill="#22c55e" class="ink" />
      <circle cx="33" cy="36" r="5" fill="rgba(255,255,255,.52)" />
      <circle cx="48" cy="45" r="3" fill="#166534" />
    </g>

    <g id="fast">
      <use href="#bg" />
      <path d="M23 58 L60 40 L23 22 Z" fill="#0ea5e9" class="ink" />
      <line x1="14" y1="30" x2="31" y2="30" stroke="#0284c7" stroke-width="3" stroke-linecap="round" />
      <line x1="11" y1="43" x2="28" y2="43" stroke="#0284c7" stroke-width="3" stroke-linecap="round" />
      <circle cx="35" cy="38" r="4" fill="rgba(255,255,255,.52)" />
    </g>

    <g id="split-body">
      <use href="#bg" />
      <ellipse cx="34" cy="43" rx="17" ry="19" fill="#84cc16" class="ink" />
      <ellipse cx="51" cy="40" rx="14" ry="16" fill="#84cc16" class="ink" />
      <circle cx="29" cy="35" r="4" fill="rgba(255,255,255,.52)" />
      <polyline points="40,24 43,38 39,56" fill="none" stroke="#78350f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <g id="split-small">
      <use href="#bg" />
      <ellipse cx="34" cy="43" rx="12" ry="14" fill="#84cc16" class="ink" />
      <ellipse cx="51" cy="40" rx="10" ry="12" fill="#84cc16" class="ink" />
      <circle cx="29" cy="35" r="4" fill="rgba(255,255,255,.52)" />
    </g>

    <g id="elite-base">
      <rect x="24" y="18" width="32" height="49" rx="13" fill="#9333ea" class="ink" />
      <circle cx="37" cy="30" r="5" fill="rgba(255,255,255,.52)" />
    </g>

    <g id="elite-shield">
      <use href="#bg" />
      <use href="#elite-base" />
      <path d="M40 25 L52 30 L49 48 C47 56 40 60 40 60 C40 60 33 56 31 48 L28 30 Z" fill="none" stroke="#d8b4fe" stroke-width="3" stroke-linejoin="round" />
    </g>

    <g id="elite-charge">
      <use href="#bg" />
      <use href="#elite-base" />
      <path d="M31 57 L42 42 L33 42 L47 24 L45 38 L53 38 Z" fill="#fef08a" stroke="#78350f" stroke-width="1.5" stroke-linejoin="round" />
      <line x1="15" y1="58" x2="31" y2="51" stroke="#9333ea" stroke-width="4" stroke-linecap="round" />
    </g>

    <g id="elite-regen">
      <use href="#bg" />
      <use href="#elite-base" />
      <rect x="36" y="28" width="8" height="27" fill="#bbf7d0" />
      <rect x="27" y="37" width="26" height="8" fill="#bbf7d0" />
    </g>

    <g id="elite-resist">
      <use href="#bg" />
      <use href="#elite-base" />
      <line x1="29" y1="34" x2="51" y2="34" stroke="#e2e8f0" stroke-width="4" stroke-linecap="round" />
      <line x1="28" y1="45" x2="52" y2="45" stroke="#e2e8f0" stroke-width="4" stroke-linecap="round" />
      <line x1="30" y1="56" x2="50" y2="56" stroke="#e2e8f0" stroke-width="4" stroke-linecap="round" />
    </g>

    <g id="elite-ghost">
      <use href="#bg" />
      <path d="M24 64 L24 35 C24 23 32 17 40 17 C49 17 57 23 57 35 L57 64 L50 58 L43 64 L36 58 L29 64 Z" fill="rgba(168,85,247,.73)" class="ink" />
      <ellipse cx="34" cy="36" rx="4" ry="5" fill="#f5f3ff" />
      <ellipse cx="47" cy="36" rx="4" ry="5" fill="#f5f3ff" />
    </g>

    <g id="miniboss">
      <ellipse cx="40" cy="43" rx="23" ry="21" fill="#ea580c" class="ink" />
      <rect x="27" y="24" width="26" height="7" fill="rgba(255,255,255,.45)" />
      <circle cx="32" cy="35" r="4" fill="rgba(255,255,255,.52)" />
    </g>

    <g id="boss">
      <ellipse cx="40" cy="43" rx="28" ry="25" fill="#dc2626" class="ink" />
      <rect x="23" y="20" width="34" height="8" fill="rgba(255,255,255,.43)" />
      <circle cx="31" cy="34" r="5" fill="rgba(255,255,255,.47)" />
    </g>

    <g id="crown">
      <path d="M26 25 L33 15 L40 25 L48 15 L55 25 L55 31 L26 31 Z" fill="#facc15" stroke="#78350f" stroke-width="1.5" stroke-linejoin="round" />
    </g>

    <g id="charge-mark">
      <path d="M31 57 L42 42 L33 42 L47 24 L45 38 L53 38 Z" fill="#fef08a" stroke="#78350f" stroke-width="1.5" stroke-linejoin="round" />
    </g>

    <g id="speed-mark">
      <path d="M23 43 A17 17 0 0 0 57 43" fill="none" stroke="#bae6fd" stroke-width="3" stroke-linecap="round" />
      <line x1="16" y1="31" x2="28" y2="31" stroke-width="4" stroke-linecap="round" />
      <line x1="13" y1="53" x2="28" y2="53" stroke-width="4" stroke-linecap="round" />
    </g>

    <g id="mini-normal">
      <use href="#bg" />
      <use href="#miniboss" />
      <use href="#crown" />
      <circle cx="40" cy="29" r="3" fill="#ea580c" />
    </g>

    <g id="mini-charge">
      <use href="#bg" />
      <use href="#miniboss" />
      <use href="#charge-mark" />
      <line x1="15" y1="58" x2="31" y2="51" stroke="#ea580c" stroke-width="4" stroke-linecap="round" />
    </g>

    <g id="mini-split">
      <use href="#bg" />
      <ellipse cx="34" cy="43" rx="20" ry="22" fill="#ea580c" class="ink" />
      <ellipse cx="51" cy="40" rx="17" ry="19" fill="#ea580c" class="ink" />
      <circle cx="29" cy="35" r="4" fill="rgba(255,255,255,.52)" />
      <polyline points="40,24 43,38 39,56" fill="none" stroke="#78350f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <rect x="31" y="19" width="18" height="6" fill="#fed7aa" />
    </g>

    <g id="mini-speed">
      <use href="#bg" />
      <use href="#miniboss" />
      <use href="#speed-mark" stroke="#ea580c" />
    </g>

    <g id="boss-normal">
      <use href="#bg" />
      <use href="#boss" />
      <use href="#crown" />
      <circle cx="40" cy="29" r="3" fill="#dc2626" />
    </g>

    <g id="boss-charge">
      <use href="#bg" />
      <use href="#boss" />
      <use href="#charge-mark" />
      <line x1="15" y1="58" x2="31" y2="51" stroke="#dc2626" stroke-width="4" stroke-linecap="round" />
    </g>

    <g id="boss-split">
      <use href="#bg" />
      <ellipse cx="34" cy="43" rx="25" ry="27" fill="#dc2626" class="ink" />
      <ellipse cx="51" cy="40" rx="21" ry="23" fill="#dc2626" class="ink" />
      <circle cx="29" cy="35" r="4" fill="rgba(255,255,255,.52)" />
      <polyline points="40,24 43,38 39,56" fill="none" stroke="#78350f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <rect x="27" y="17" width="26" height="7" fill="#fecaca" />
    </g>

    <g id="boss-speed">
      <use href="#bg" />
      <use href="#boss" />
      <use href="#speed-mark" stroke="#dc2626" />
    </g>
  </defs>

  <rect class="page" width="760" height="610" />
  <text x="24" y="34" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">Enemy fallback previews</text>
  <text x="24" y="58" font-family="Segoe UI, sans-serif" font-size="12" fill="#94a3b8">이미지 파일이 없을 때 팝업에서 쓰는 기본 적 이미지</text>

  <g transform="translate(20 80)">
    <g transform="translate(0 0)"><rect class="card" width="170" height="112" rx="8"/><use href="#normal" x="45" y="10"/><text class="title" x="14" y="92">일반</text><text class="id" x="70" y="92">enemy_normal</text></g>
    <g transform="translate(190 0)"><rect class="card" width="170" height="112" rx="8"/><use href="#fast" x="45" y="10"/><text class="title" x="14" y="92">빠른</text><text class="id" x="70" y="92">enemy_fast</text></g>
    <g transform="translate(380 0)"><rect class="card" width="170" height="112" rx="8"/><use href="#split-body" x="45" y="10"/><text class="title" x="14" y="92">분열체</text><text class="id" x="70" y="92">split_body</text></g>
    <g transform="translate(570 0)"><rect class="card" width="170" height="112" rx="8"/><use href="#split-small" x="45" y="10"/><text class="title" x="14" y="92">작은 분열</text><text class="id" x="84" y="92">split_small</text></g>

    <g transform="translate(0 122)"><rect class="card" width="170" height="112" rx="8"/><use href="#elite-shield" x="45" y="10"/><text class="title" x="14" y="92">엘리트 보호막</text><text class="id" x="104" y="92">shield</text></g>
    <g transform="translate(190 122)"><rect class="card" width="170" height="112" rx="8"/><use href="#elite-charge" x="45" y="10"/><text class="title" x="14" y="92">엘리트 돌진</text><text class="id" x="96" y="92">charge</text></g>
    <g transform="translate(380 122)"><rect class="card" width="170" height="112" rx="8"/><use href="#elite-regen" x="45" y="10"/><text class="title" x="14" y="92">엘리트 재생</text><text class="id" x="96" y="92">regen</text></g>
    <g transform="translate(570 122)"><rect class="card" width="170" height="112" rx="8"/><use href="#elite-resist" x="45" y="10"/><text class="title" x="14" y="92">엘리트 저항</text><text class="id" x="96" y="92">resist</text></g>

    <g transform="translate(0 244)"><rect class="card" width="170" height="112" rx="8"/><use href="#elite-ghost" x="45" y="10"/><text class="title" x="14" y="92">엘리트 유령</text><text class="id" x="96" y="92">ghost</text></g>
    <g transform="translate(190 244)"><rect class="card" width="170" height="112" rx="8"/><use href="#mini-normal" x="45" y="10"/><text class="title" x="14" y="92">중간보스</text><text class="id" x="84" y="92">mini_normal</text></g>
    <g transform="translate(380 244)"><rect class="card" width="170" height="112" rx="8"/><use href="#mini-charge" x="45" y="10"/><text class="title" x="14" y="92">중간 돌진</text><text class="id" x="84" y="92">mini_charge</text></g>
    <g transform="translate(570 244)"><rect class="card" width="170" height="112" rx="8"/><use href="#mini-split" x="45" y="10"/><text class="title" x="14" y="92">중간 분열</text><text class="id" x="84" y="92">mini_split</text></g>

    <g transform="translate(0 366)"><rect class="card" width="170" height="112" rx="8"/><use href="#mini-speed" x="45" y="10"/><text class="title" x="14" y="92">중간 스피드</text><text class="id" x="96" y="92">mini_speed</text></g>
    <g transform="translate(190 366)"><rect class="card" width="170" height="112" rx="8"/><use href="#boss-normal" x="45" y="10"/><text class="title" x="14" y="92">보스</text><text class="id" x="70" y="92">boss_normal</text></g>
    <g transform="translate(380 366)"><rect class="card" width="170" height="112" rx="8"/><use href="#boss-charge" x="45" y="10"/><text class="title" x="14" y="92">보스 돌진</text><text class="id" x="84" y="92">boss_charge</text></g>
    <g transform="translate(570 366)"><rect class="card" width="170" height="112" rx="8"/><use href="#boss-split" x="45" y="10"/><text class="title" x="14" y="92">보스 분열</text><text class="id" x="84" y="92">boss_split</text></g>

    <g transform="translate(0 488)"><rect class="card" width="170" height="112" rx="8"/><use href="#boss-speed" x="45" y="10"/><text class="title" x="14" y="92">보스 스피드</text><text class="id" x="96" y="92">boss_speed</text></g>
  </g>
</svg>
